<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data City — SVG recreation</title>
<style>
body{margin:0;background:#04030a;color:#cdd1e0;font-family:ui-monospace,monospace;padding:24px}
h1{font-size:17px;margin:0 0 4px}.sub{font-size:12px;color:#8a8398;margin:0 0 14px;max-width:1000px;line-height:1.5}
.frame{max-width:1200px;margin:0 auto;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px #000a,0 0 0 1px #211632}
svg{display:block;width:100%;height:auto}
</style></head><body>
<h1>Data City — SVG flat-cel recreation</h1>
<p class="sub">Vector recreation of your reference. Flat faces, restrained window bands, twilight palette, spire, light-trails, palms. Buildings/windows are data-bindable (height = metric, lit windows = days/values).</p>
<div class="frame"><svg id="scene" viewBox="0 0 2000 920" preserveAspectRatio="xMidYMid slice"></svg></div>
<script>
const NS='http://www.w3.org/2000/svg';
const S=document.getElementById('scene');
function E(n,a,p){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);(p||S).appendChild(e);return e;}
function rnd(a,b){return a+Math.random()*(b-a)}

// ---- defs: gradients + haze ----
const defs=E('defs',{});
defs.innerHTML=`
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
 <stop offset="0" stop-color="#1f2f9e"/><stop offset="0.45" stop-color="#2c3fb0"/>
 <stop offset="0.72" stop-color="#3a45ad"/><stop offset="0.9" stop-color="#7a4f9e"/></linearGradient>
<radialGradient id="vpglow" cx="0.5" cy="0.5" r="0.5">
 <stop offset="0" stop-color="#ffe6cf" stop-opacity="0.9"/><stop offset="0.4" stop-color="#ff9ec4" stop-opacity="0.5"/>
 <stop offset="1" stop-color="#ff9ec4" stop-opacity="0"/></radialGradient>
<linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
 <stop offset="0" stop-color="#5a4a8f"/><stop offset="0.4" stop-color="#2e2350"/><stop offset="1" stop-color="#181030"/></linearGradient>
<linearGradient id="pinkFace" x1="0" y1="0" x2="1" y2="0">
 <stop offset="0" stop-color="#f4a0b8"/><stop offset="1" stop-color="#d05a86"/></linearGradient>
<linearGradient id="magFace" x1="0" y1="0" x2="1" y2="0">
 <stop offset="0" stop-color="#ef7aa6"/><stop offset="1" stop-color="#a8397e"/></linearGradient>
<linearGradient id="hazeBand" x1="0" y1="0" x2="0" y2="1">
 <stop offset="0" stop-color="#ff9ec4" stop-opacity="0"/><stop offset="0.5" stop-color="#ff9ec4" stop-opacity="0.28"/><stop offset="1" stop-color="#ff9ec4" stop-opacity="0"/></linearGradient>`;

// ---- sky ----
E('rect',{x:0,y:0,width:2000,height:920,fill:'url(#sky)'});
// stars
for(let i=0;i<40;i++)E('circle',{cx:rnd(0,2000),cy:rnd(0,420),r:rnd(0.6,1.6),fill:'#fff',opacity:rnd(0.2,0.7).toFixed(2)});
// vanishing glow
E('ellipse',{cx:980,cy:660,rx:360,ry:150,fill:'url(#vpglow)'});

const BASE=760; // street level where buildings stand

// building with horizontal window bands + shadow side
function bld(o){
  const g=E('g',{});
  const face=o.fill;
  E('rect',{x:o.x,y:o.top,width:o.w,height:BASE-o.top,fill:face,opacity:o.op||1},g);
  // shadow side strip
  E('rect',{x:o.shadow==='l'?o.x:o.x+o.w*0.72,y:o.top,width:o.w*0.28,height:BASE-o.top,fill:'#000',opacity:0.16},g);
  // roof highlight
  E('rect',{x:o.x,y:o.top,width:o.w,height:5,fill:o.roof||'#ffffff',opacity:0.25},g);
  // window bands
  const floorH=o.floor||16;const pad=Math.max(4,o.w*0.08);
  const cols=Math.max(2,Math.round((o.w-2*pad)/Math.max(8,o.w*0.14)));
  const cellW=(o.w-2*pad)/cols;
  for(let y=o.top+14;y<BASE-10;y+=floorH){
    for(let c=0;c<cols;c++){
      const on=Math.random()<(o.lit||0.25);
      const wx=o.x+pad+c*cellW;
      let col=face, op=0.0;
      if(on){const r=Math.random();col=r<0.74?(o.warm||'#ffd98a'):r<0.9?'#4fd6e8':'#2FE6A8';op=rnd(0.55,0.95);}
      else {col='#000';op=0.14;}
      E('rect',{x:wx+1,y:y,width:cellW-2,height:floorH*0.5,fill:col,opacity:op.toFixed(2)},g);
    }
  }
  return g;
}

// ===== FAR hazy cluster near VP (desaturated, behind) =====
[[860,70,560,'#5566a8'],[930,52,600,'#6a5a98'],[1010,64,540,'#5a6aa6'],[800,46,600,'#4f5fa0'],[1080,40,580,'#7a5a90']]
 .forEach(([x,w,top,f])=>bld({x,w,top,fill:f,op:0.62,lit:0.18,warm:'#ffcf9a'}));

// ===== MID buildings =====
bld({x:540,w:150,top:170,fill:'#28335f',shadow:'r',lit:0.16,warm:'#ffe0a0',floor:18}); // dark slate tower (center-left)
bld({x:1130,w:96,top:400,fill:'#2a3560',shadow:'r',lit:0.18,warm:'#ffd98a'});           // dark tower right of spire
bld({x:1020,w:90,top:520,fill:'url(#magFace)',shadow:'r',lit:0.3});
bld({x:760,w:70,top:560,fill:'#bd6a92',shadow:'r',lit:0.3});

// ===== SPIRE (CN-tower) center =====
(function(){const cx=900;const g=E('g',{});
 E('rect',{x:cx-7,y:430,width:14,height:330,fill:'url(#pinkFace)'},g);       // shaft
 E('rect',{x:cx-3,y:300,width:6,height:140,fill:'#e98fb0'},g);               // upper shaft
 E('ellipse',{cx:cx,cy:362,rx:17,ry:21,fill:'#e87a9e'},g);                    // pod bulb
 E('rect',{x:cx-20,y:360,width:40,height:5,fill:'#c85a86'},g);               // pod ring
 E('rect',{x:cx-2,y:120,width:4,height:180,fill:'#f29ab0'},g);               // antenna
 E('circle',{cx:cx,cy:120,r:4,fill:'#ffd98a'},g);
 E('rect',{x:cx-22,y:700,width:44,height:60,fill:'#9a4a7e'},g);              // base
})();

// ===== NEAR flanking (sharp, big) =====
// far-left dark navy
bld({x:-10,w:170,top:30,fill:'#1b2545',shadow:'r',lit:0.32,warm:'#4fd6e8',floor:18});
E('rect',{x:30,y:300,width:120,height:26,fill:'#f0a850',opacity:0.9}); // amber band accent
// left slate thin tall
bld({x:150,w:90,top:0,fill:'#3a4a78',shadow:'r',lit:0.12,warm:'#cfe0ff'});
// left pink mid
bld({x:360,w:150,top:300,fill:'url(#pinkFace)',shadow:'r',lit:0.34});
bld({x:470,w:120,top:560,fill:'#e87a9e',shadow:'l',lit:0.3});
// right tall pink (upper right cluster)
bld({x:1280,w:170,top:170,fill:'url(#pinkFace)',shadow:'l',lit:0.36,warm:'#ffe0a0'});
bld({x:1450,w:120,top:330,fill:'#cf6a96',shadow:'l',lit:0.28});
bld({x:1560,w:90,top:430,fill:'#3a4a78',shadow:'l',lit:0.2,warm:'#7fd6e8'}); // blue windowed
// right teal low building (foreground mid-right)
bld({x:1300,w:200,top:640,fill:'#6fb8b8',shadow:'l',lit:0.22,warm:'#d8f0e0'});
// far-right near big
bld({x:1830,w:200,top:10,fill:'url(#magFace)',shadow:'l',lit:0.32,warm:'#ffe0a0'});
bld({x:1700,w:110,top:230,fill:'#e87a9e',shadow:'l',lit:0.3});

// ===== ROAD =====
const vpx=965,vpy=620;
E('polygon',{points:`760,920 ${vpx-22},${vpy} ${vpx+22},${vpy} 1230,920`,fill:'url(#road)'});
// center dashes
for(let i=0;i<10;i++){const t=i/10;const y=920-(920-vpy)*t;const x=1000-(1000-vpx)*t*0.0;
  E('rect',{x:vpx-1,y:920-(920-vpy)*t,width:2+ (1-t)*4,height:10+(1-t)*14,fill:'#ffd98a',opacity:0.4});}
// light trails — red (right) + white (left), curving to VP
function trail(side,col){const g=E('g',{});
  for(let i=0;i<11;i++){const p1x=vpx+side*(1+i*0.6),p1y=vpy;
    const p2x=1000+side*(46+i*32),p2y=770; const p3x=1000+side*(100+i*78),p3y=920;
    E('path',{d:`M ${p1x} ${p1y} Q ${p2x} ${p2y} ${p3x} ${p3y}`,fill:'none',stroke:col,
      'stroke-width':(1.4+i*0.6).toFixed(1),opacity:(0.4+0.5*Math.random()).toFixed(2),'stroke-linecap':'round'},g);}
}
trail(1,'#ff3b5c'); trail(1,'#ff6b8c'); trail(-1,'#fff2d0'); trail(-1,'#ffe0a0');
// a couple foreground car glows
E('ellipse',{cx:940,cy:860,rx:18,ry:6,fill:'#ff3b5c',opacity:0.7});
E('ellipse',{cx:1000,cy:840,rx:14,ry:5,fill:'#fff2d0',opacity:0.7});

// ===== HAZE band over mid (atmosphere) =====
E('rect',{x:0,y:560,width:2000,height:170,fill:'url(#hazeBand)',opacity:0.5});

// ===== FOREGROUND PALMS + lamps =====
const palm=`M0 200 C-4 150 -10 110 -12 80 L-4 80 C0 120 6 160 10 200Z
M-8 84 C-46 66 -78 72 -92 90 C-58 80 -28 84 -8 98Z
M-6 80 C-36 44 -78 30 -98 36 C-62 40 -30 56 -8 86Z
M-6 78 C-14 40 -2 8 22 -6 C0 14 -2 48 -2 80Z
M-4 80 C34 50 74 48 92 60 C58 54 24 64 -2 90Z
M-4 82 C36 76 76 88 90 106 C58 88 24 84 -6 94Z`;
function addPalm(x,y,sc,flip,fill){const g=E('g',{transform:`translate(${x} ${y}) scale(${flip?-sc:sc} ${sc})`});
  E('path',{d:palm,fill:fill||'#0e1838'},g);}
addPalm(470,920,2.6,false,'#0c1530');
addPalm(560,920,2.0,true,'#0a1228');
addPalm(330,920,1.5,false,'#0e1838');
addPalm(1800,920,3.0,false,'#0a1126');
addPalm(1950,920,2.4,true,'#0c1530');
addPalm(1700,920,1.6,true,'#0e1838');
// bushes
E('ellipse',{cx:700,cy:910,rx:90,ry:34,fill:'#0e1838'});
E('ellipse',{cx:1250,cy:912,rx:110,ry:36,fill:'#0c1530'});
// cyan street lamp dots (left)
E('circle',{cx:180,cy:840,r:10,fill:'#4fe6f0'});E('circle',{cx:180,cy:840,r:20,fill:'#4fe6f0',opacity:0.3});
E('circle',{cx:235,cy:858,r:9,fill:'#4fe6f0'});E('circle',{cx:235,cy:858,r:18,fill:'#4fe6f0',opacity:0.3});
</script></body></html>
