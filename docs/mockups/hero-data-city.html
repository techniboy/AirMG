<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data City — CSS hero scene</title>
<style>
*{box-sizing:border-box}
@keyframes flow{0%{transform:translate3d(0,0,0);opacity:0}8%{opacity:1}92%{opacity:1}100%{opacity:0}}
body{margin:0;background:#04030a;color:#cdd1e0;font-family:ui-monospace,monospace;padding:28px}
h1{font-size:18px;margin:0 0 4px}.sub{font-size:12px;color:#8a8398;margin:0 0 16px;line-height:1.5;max-width:1000px}
.city{position:relative;width:100%;max-width:1100px;margin:0 auto;aspect-ratio:2/1;border-radius:14px;overflow:hidden;
  background:linear-gradient(#1c2a8e 0%,#283aa6 26%,#5a3aa0 52%,#b14a92 70%,#ff7ab0 84%,#ffd6c4 100%);
  box-shadow:0 20px 60px #000a,0 0 0 1px #211632}
.layer{position:absolute;inset:0}
.vp{position:absolute;left:50%;top:52%;width:42%;height:34%;transform:translate(-50%,-50%);
  background:radial-gradient(ellipse,#ffe6d0cc,#ff9ec466 38%,transparent 70%);filter:blur(2px);z-index:1}
.bld{position:absolute;bottom:36%;border-radius:2px 2px 0 0;overflow:hidden;display:grid;gap:2px;padding:3px}
.bld .w{border-radius:.5px}
/* hero spire */
.spire{position:absolute;bottom:36%;left:43%;z-index:60;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.spire .mast{width:3px;height:50px;background:linear-gradient(#ff9ec4,#d14a8f);box-shadow:0 0 6px #ff7ab0}
.spire .bulb{width:16px;height:22px;border-radius:50%;background:linear-gradient(#ffb0c8,#c64a8c);box-shadow:0 0 10px #ff7ab0;margin-top:-2px}
.spire .shaft{width:9px;height:120px;background:linear-gradient(#e88fb0,#a83a7e);box-shadow:0 0 10px #ff7ab088}
.spire .base{width:16px;height:40px;background:linear-gradient(#c66a9e,#7a2a6e)}
/* road */
.road{position:absolute;left:0;right:0;bottom:0;height:48%;z-index:50;
  background:linear-gradient(#3a2348 0%,#241a38 40%,#160e26 100%);
  clip-path:polygon(48% 0,52% 0,86% 100%,14% 100%)}
.road .lane{position:absolute;left:50%;top:0;bottom:0;width:1px;transform:translateX(-50%);
  background:repeating-linear-gradient(#ffd98a 0 6px,transparent 6px 16px);opacity:.5}
.trail{position:absolute;left:50%;border-radius:2px;animation:flow linear infinite}
.palm{position:absolute;bottom:-2%;z-index:80;filter:drop-shadow(0 2px 4px #0006)}
.haze{position:absolute;left:0;right:0;top:40%;height:30%;z-index:55;pointer-events:none;
  background:linear-gradient(transparent,#ff9ec433 60%,transparent);filter:blur(6px)}
.grain{position:absolute;inset:0;z-index:90;pointer-events:none;opacity:.05;
  background:repeating-linear-gradient(0deg,transparent 0 2px,#000 2px 3px)}
</style></head><body>
<h1>Data City — CSS stylized hero (buildings = data)</h1>
<p class="sub">Stylized vector take on your reference. Not painterly-photoreal — but crisp, animated, and the windows/heights are real data. Skyline + Traffic + City-Pop palette composed into one street. Twilight now; the phase engine would swing it sunrise→night.</p>
<div class="city" id="city">
  <div class="vp"></div>
  <div class="layer" id="far"></div>
  <div class="layer" id="mid"></div>
  <div class="spire"><div class="mast"></div><div class="bulb"></div><div class="shaft"></div><div class="base"></div></div>
  <div class="layer" id="near"></div>
  <div class="haze"></div>
  <div class="road"><div class="lane"></div><div class="layer" id="trails"></div></div>
  <svg class="palm" style="left:-1%;width:26%" viewBox="0 0 200 200"><g fill="#0b1430"><path d="M70 200 C66 150 60 110 58 80 L66 80 C70 120 76 160 80 200Z"/><path d="M62 84 C30 70 8 74 0 88 C24 80 48 84 62 96Z"/><path d="M64 80 C44 50 18 40 2 44 C30 46 52 60 66 86Z"/><path d="M64 78 C58 44 66 16 84 4 C70 22 70 50 70 80Z"/><path d="M66 80 C92 54 120 50 134 60 C108 56 82 64 70 88Z"/><path d="M66 82 C96 74 124 82 134 98 C108 84 82 80 68 92Z"/></g></svg>
  <svg class="palm" style="right:-2%;width:30%;transform:scaleX(-1)" viewBox="0 0 200 200"><g fill="#0a1228"><path d="M70 200 C66 150 60 110 58 80 L66 80 C70 120 76 160 80 200Z"/><path d="M62 84 C30 70 8 74 0 88 C24 80 48 84 62 96Z"/><path d="M64 80 C44 50 18 40 2 44 C30 46 52 60 66 86Z"/><path d="M64 78 C58 44 66 16 84 4 C70 22 70 50 70 80Z"/><path d="M66 80 C92 54 120 50 134 60 C108 56 82 64 70 88Z"/><path d="M66 82 C96 74 124 82 134 98 C108 84 82 80 68 92Z"/></g></svg>
  <div class="grain"></div>
</div>
<script>
const REC=['#FF4F73','#F5A623','#E8C24B','#18C98B','#2FE6A8'];
const WARM=['#ffd98a','#ffe9b0','#ffb86b'];
const FACE={
  pink:['linear-gradient(135deg,#ff9ec4,#d14a8f 58%,#7a2a6e)','#5a1f52'],
  blue:['linear-gradient(135deg,#46569e,#222b54 68%,#10172e)','#161d3a'],
  mag:['linear-gradient(135deg,#ff8fb0,#b13a82 62%,#5e1f56)','#48184a'],
};
function rnd(a,b){return a+Math.random()*(b-a)}
function makeBld(host,o){
  const b=document.createElement('div');b.className='bld';
  b.style.left=o.x+'%';b.style.width=o.w+'%';b.style.height=o.h+'%';b.style.bottom=o.bottom+'%';
  const f=FACE[o.face];b.style.background=f[0];b.style.zIndex=o.z;
  if(o.blur)b.style.filter='blur('+o.blur+'px)';b.style.opacity=o.op;
  const cols=Math.max(2,Math.round(o.w*2.6)),rows=Math.max(3,Math.round(o.h*0.34));
  b.style.gridTemplateColumns='repeat('+cols+',1fr)';
  for(let i=0;i<cols*rows;i++){const w=document.createElement('div');w.className='w';
    const on=Math.random()<o.lit;
    if(on){let c;const r=Math.random();c=r<.7?WARM[Math.floor(Math.random()*3)]:r<.85?'#16d8e8':REC[3+Math.floor(Math.random()*2)];
      w.style.background=c;w.style.opacity=(0.55+Math.random()*0.45).toFixed(2);w.style.boxShadow='0 0 2px '+c;}
    else{w.style.background=f[1];w.style.opacity=.7;}
    b.appendChild(w);}
  host.appendChild(b);
}
// FAR silhouettes (toward VP, small, desaturated)
const far=document.getElementById('far');
for(let i=0;i<22;i++){const side=i%2?1:-1;const t=rnd(.4,1);const sc=1-0.55*t;
  const outer=side<0?rnd(4,40):rnd(60,96);const cx=50+side*4;const x=outer+(cx-outer)*t;
  makeBld(far,{x:x-3,w:rnd(4,7)*sc+2,h:rnd(26,52)*sc,bottom:36,face:Math.random()<.5?'pink':'blue',z:Math.round((1-t)*40),op:(0.55+0.35*(1-t)).toFixed(2),blur:(t*1).toFixed(1),lit:.35});}
// MID buildings
const mid=document.getElementById('mid');
const midSpec=[[-1,8,12,72,'blue',.5],[-1,20,9,58,'pink',.55],[-1,30,7,46,'mag',.5],
  [1,62,7,50,'pink',.55],[1,70,9,62,'mag',.5],[1,80,10,68,'blue',.55],[1,90,11,78,'pink',.5]];
midSpec.forEach(([s,x,w,h,face,lit])=>makeBld(mid,{x,w,h,bottom:36,face,z:45,op:.92,blur:.3,lit}));
// NEAR flanking (big, sharp, data)
const near=document.getElementById('near');
makeBld(near,{x:-2,w:16,h:92,bottom:36,face:'blue',z:70,op:1,blur:0,lit:.45});
makeBld(near,{x:13,w:9,h:64,bottom:36,face:'pink',z:68,op:1,blur:0,lit:.5});
makeBld(near,{x:84,w:18,h:90,bottom:36,face:'pink',z:70,op:1,blur:0,lit:.5});
makeBld(near,{x:76,w:9,h:60,bottom:36,face:'mag',z:68,op:1,blur:0,lit:.5});
// light trails along the avenue (converging to VP)
const tr=document.getElementById('trails');
for(let i=0;i<26;i++){const t=Math.pow(Math.random(),0.7);const red=Math.random()<.5;
  const yTop=4+ (1-t)*92; // near bottom = far down
  const el=document.createElement('div');el.className='trail';
  const spread=(1-t)*44; el.style.left=(50+ (Math.random()-0.5)*spread)+'%';
  el.style.bottom=(t*96)+'%';el.style.width=(2+ (1-t)*10)+'px';el.style.height=(2+(1-t)*5)+'px';
  const c=red?'#ff3b5c':'#fff6e0';el.style.background=c;el.style.boxShadow='0 0 '+(4+ (1-t)*8)+'px '+c;
  el.style.opacity=(0.5+0.5*(1-t)).toFixed(2);el.style.animationDuration=(2.4+Math.random()*2)+'s';el.style.animationDelay=(-Math.random()*4)+'s';
  tr.appendChild(el);}
</script></body></html>
